services:
  web-server:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-app
      
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - PYTHONBUFFERED=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - MARTIAN_DB_CONNSTRING=${MARTIAN_DB_CONNSTRING}
      - MARTIAN_PYTHON_SO_PATH=${MARTIAN_PYTHON_SO_PATH}
      - MARTIAN_OPENAI_KEY=${MARTIAN_OPENAI_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
      #user: "33:33"
    environment:
      POSTGRES_USER: www-data
      POSTGRES_PASSWORD: ${MARTIAN_DB_PASSWORD} 
      POSTGRES_DB: mgdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  postgres_data:
